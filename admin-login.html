<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — My Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="login-body">

  <!-- Background shapes -->
  <div class="login-bg">
    <div class="login-shape s1"></div>
    <div class="login-shape s2"></div>
  </div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1 class="login-title">Admin Panel</h1>
        <p class="login-subtitle">Sign in to manage your website</p>
      </div>

      <!-- Error Message -->
      <div class="alert alert-error" id="loginError" style="display:none;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="loginErrorMsg">Invalid credentials.</span>
      </div>

      <!-- Form -->
      <div class="login-form">
        <div class="form-group">
          <label class="form-label" for="loginEmail">
            <i class="fa-solid fa-envelope"></i> Email
          </label>
          <input
            type="email"
            id="loginEmail"
            class="form-input"
            placeholder="admin@example.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="input-with-icon">
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button class="toggle-pw" id="togglePw" type="button" title="Show/hide password">
              <i class="fa-solid fa-eye" id="pwEyeIcon"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
          <span id="loginBtnText">Sign In</span>
          <span id="loginBtnLoader" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin"></i> Signing in...
          </span>
        </button>
      </div>

      <!-- Footer -->
      <p class="login-footer-note">
        <i class="fa-solid fa-arrow-left"></i>
        <a href="index.html">Back to Website</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
<script src="/js/firebase.js"></script>
<script src="js/admin-firebase.js"></script>

<script src="/js/cloudinary.js"></script>
<script src="js/admin-cloudinary.js"></script>

  
  
  <script>
    
    
    /* ──────────────────────────────
       Password show/hide toggle
    ────────────────────────────── */
    const togglePw = document.getElementById('togglePw');
    const pwInput = document.getElementById('loginPassword');
    const eyeIcon = document.getElementById('pwEyeIcon');

    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      eyeIcon.className = isText ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
    });

    /* ──────────────────────────────
       Enter key to submit
    ────────────────────────────── */
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginEmail').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    /* ──────────────────────────────
       HANDLE LOGIN
    ────────────────────────────── */
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');
      const errorMsg = document.getElementById('loginErrorMsg');
      const btnText = document.getElementById('loginBtnText');
      const btnLoader = document.getElementById('loginBtnLoader');
      const loginBtn = document.getElementById('loginBtn');

      // Basic validation
      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      // Loading state
      btnText.style.display = 'none';
      btnLoader.style.display = 'inline';
      loginBtn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        // On success, admin-firebase.js onAuthStateChanged will redirect
        window.location.href = 'admin.html';
      } catch (err) {
        let message = 'Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') message = 'No account found with this email.';
        else if (err.code === 'auth/wrong-password') message = 'Incorrect password.';
        else if (err.code === 'auth/invalid-email') message = 'Invalid email address.';
        else if (err.code === 'auth/too-many-requests') message = 'Too many attempts. Try later.';
        else if (err.code === 'auth/invalid-credential') message = 'Wrong email or password.';
        showError(message);
      } finally {
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
        loginBtn.disabled = false;
      }
    }

    function showError(msg) {
      const errorDiv = document.getElementById('loginError');
      const errorMsg = document.getElementById('loginErrorMsg');
      errorMsg.textContent = msg;
      errorDiv.style.display = 'flex';
    }
  </script>
</body>
</html>
